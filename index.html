<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Élite Care — Project Dashboard v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1c;--sf:#0f172a;--cd:#1e293b;--bd:#334155;--tx:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--nv:#1B365D;--gd:#C49A2A;--gd2:#f0d878;--rd:#ef4444;--gn:#22c55e;--yl:#f59e0b}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
button{font-family:inherit;cursor:pointer}
.hd{background:linear-gradient(135deg,var(--sf),var(--cd));border-bottom:1px solid var(--bd);padding:16px 22px}
.hd-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.brand h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--gd),var(--gd2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand p{font-size:10px;color:var(--t3);letter-spacing:1px;margin-top:2px}
.ring-area{display:flex;align-items:center;gap:12px}
.ring-pct .num{font-size:26px;font-weight:700;color:var(--gd);line-height:1}
.ring-pct .lbl{font-size:8px;color:var(--t3);text-align:center}
.ring{width:80px;height:80px;position:relative}
.ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-in .n{font-size:11px;font-weight:600;color:var(--gd)}
.ring-in .l{font-size:8px;color:var(--t3)}
.sts{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.st{background:var(--cd);border-radius:6px;padding:4px 9px;display:flex;align-items:center;gap:4px;font-size:10px}
.st .dot{width:6px;height:6px;border-radius:50%}
.st .v{font-weight:700;font-size:13px}
.fl{padding:7px 22px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.vt{display:flex;background:var(--cd);border-radius:6px;overflow:hidden;margin-right:3px}
.vt button{padding:4px 9px;font-size:10px;background:transparent;color:var(--t2);border:none}
.vt button.on{background:var(--gd);color:var(--bg);font-weight:600}
.si{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;color:var(--tx);font-size:10px;outline:none;width:150px;font-family:inherit}
.si::placeholder{color:var(--t3)}
.fsel{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:4px 7px;color:var(--tx);font-size:10px;cursor:pointer;font-family:inherit;outline:none}
.fbtn{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:4px 9px;color:var(--t2);font-size:10px}
.fbtn.on{background:var(--rd);color:#fff;font-weight:600;border-color:var(--rd)}
.abtn{background:var(--gd);color:var(--bg);border:none;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:600}
.xbtn{background:transparent;border:1px solid var(--gd);border-radius:6px;padding:4px 9px;color:var(--gd);font-size:10px}
.rbtn{background:transparent;border:1px solid var(--bd);border-radius:6px;padding:4px 7px;color:var(--t3);font-size:9px;margin-left:auto}
.main-wrap{display:flex;height:calc(100vh - 170px);overflow:hidden}
.task-list{flex:1;overflow-y:auto;padding:12px 16px}
.detail-panel{width:420px;background:var(--sf);border-left:1px solid var(--bd);overflow-y:auto;padding:16px;display:none;flex-shrink:0}
.detail-panel.open{display:block}
/* LIST ITEMS */
.lg-t{font-size:12px;font-weight:700;margin:10px 0 5px;display:flex;align-items:center;gap:5px}
.lg-t .cn{font-size:9px;color:var(--t3);font-weight:400}
.lr{background:var(--cd);border-radius:6px;margin-bottom:2px;border:1px solid transparent;transition:.12s;cursor:pointer}
.lr:hover{border-color:var(--bd)}
.lr.sel{border-color:var(--gd);background:#1a2744}
.lr-m{display:flex;align-items:center;gap:6px;padding:6px 10px}
.lr-m .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.lr-m .id{font-size:9px;font-weight:700;width:30px;flex-shrink:0}
.lr-m .cr{font-size:8px;color:var(--yl);font-weight:700;flex-shrink:0;width:12px}
.lr-m .tk{font-size:10px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lr-m .rp{font-size:9px;color:var(--t3);width:95px;text-align:right;flex-shrink:0}
.lr-m .dt{font-size:8px;color:var(--t3);width:75px;text-align:right;flex-shrink:0}
.lr-m select{font-size:8px;font-weight:600;border:none;border-radius:3px;padding:2px 4px;cursor:pointer;outline:none;width:68px;flex-shrink:0;font-family:inherit}
/* DETAIL PANEL */
.dp-hd{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.dp-id{font-size:12px;font-weight:700;padding:2px 8px;border-radius:4px}
.dp-cr{font-size:10px;color:var(--yl);background:rgba(251,191,36,.12);padding:2px 6px;border-radius:3px;font-weight:600}
.dp-title{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:10px;line-height:1.3}
.dp-sbtns{display:flex;gap:3px;margin-bottom:12px}
.dp-sbtns button{flex:1;padding:5px 0;font-size:9px;border-radius:4px;border:1px solid;font-family:inherit}
.dp-section{margin-bottom:14px}
.dp-section-title{font-size:10px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.dp-desc{font-size:11px;line-height:1.5;color:var(--t2);margin-bottom:8px}
.dp-check{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:11px;color:var(--tx);line-height:1.35}
.dp-check input{margin-top:2px;flex-shrink:0;cursor:pointer}
.dp-ref{font-size:10px;color:var(--t3);line-height:1.4;margin-bottom:3px;padding-left:8px;border-left:2px solid var(--gd)}
.dp-ref a{color:var(--gd);text-decoration:none}
.dp-ref a:hover{text-decoration:underline}
.dp-field{margin-bottom:6px}
.dp-field label{font-size:9px;color:var(--t3);display:block;margin-bottom:2px}
.dp-field input,.dp-field select,.dp-field textarea{width:100%;background:var(--cd);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-size:11px;font-family:inherit;outline:none}
.dp-field textarea{min-height:50px;resize:vertical}
.dp-del{background:transparent;border:1px solid var(--rd);border-radius:4px;padding:4px 10px;color:var(--rd);font-size:10px;margin-top:8px;width:100%}
/* PROGRESS */
.ps{padding:12px 22px;border-top:1px solid var(--bd)}
.ps h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--gd);margin-bottom:8px}
.pg{display:flex;gap:6px;flex-wrap:wrap}
.pc{background:var(--cd);border-radius:7px;padding:8px 10px;cursor:pointer;flex:1;min-width:140px}
.pc-t{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pc-t .nm{font-size:10px;font-weight:600}
.pc-t .pt{font-size:10px;font-weight:700}
.pc-b{height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.pc-bf{height:100%;border-radius:2px;transition:width .4s}
.pc-s{font-size:8px;color:var(--t3);margin-top:3px}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--cd);border-radius:10px;padding:18px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;border:1px solid var(--bd)}
.modal h2{font-family:'Playfair Display',serif;font-size:16px;color:var(--gd);margin-bottom:12px}
.modal .fr{display:flex;flex-direction:column;gap:7px}
.modal .fr label{font-size:10px;color:var(--t2);font-weight:600}
.modal .fr input,.modal .fr select,.modal .fr textarea{background:var(--sf);border:1px solid var(--bd);border-radius:5px;padding:6px 9px;color:var(--tx);font-size:11px;font-family:inherit;outline:none;width:100%}
.modal .fr textarea{min-height:50px;resize:vertical}
.modal .btns{display:flex;gap:6px;margin-top:12px;justify-content:flex-end}
.modal .btns button{padding:6px 14px;border-radius:5px;font-size:10px;font-weight:600;font-family:inherit}
.modal .btns .cancel{background:transparent;border:1px solid var(--bd);color:var(--t2)}
.modal .btns .save{background:var(--gd);border:none;color:var(--bg)}
.empty{text-align:center;padding:14px;color:var(--bd);font-size:11px}
@media(max-width:900px){.detail-panel{width:340px}.lr-m .rp,.lr-m .dt{display:none}}
@media(max-width:650px){.main-wrap{flex-direction:column;height:auto}.detail-panel{width:100%;border-left:none;border-top:1px solid var(--bd)}.task-list{max-height:50vh}}

.gw{overflow-x:auto;padding-bottom:10px}.gc{position:relative;min-width:850px}.gc-hd{display:flex;border-bottom:2px solid var(--bd);margin-bottom:2px;background:var(--sf)}.gc-lh{width:190px;flex-shrink:0;padding:5px 8px;font-size:9px;font-weight:700;color:var(--gd)}.gc-ds{flex:1;display:flex}.gc-d{flex:1;text-align:center;font-size:7px;color:var(--t3);padding:2px 0;border-left:1px solid rgba(51,65,85,.3);min-width:18px}.gc-d.gwe{background:rgba(255,255,255,.02)}.gc-d.gtd{background:rgba(196,154,42,.1);color:var(--gd);font-weight:700}.gc-st{font-size:10px;font-weight:700;padding:4px 8px;margin-top:3px;border-radius:3px}.gc-r{display:flex;align-items:center;height:20px;border-bottom:1px solid rgba(51,65,85,.2)}.gc-r:hover{background:rgba(255,255,255,.02)}.gc-r.gsel{background:rgba(196,154,42,.06)}.gc-lb{width:190px;flex-shrink:0;padding:0 6px;display:flex;align-items:center;gap:3px;overflow:hidden;cursor:pointer}.gc-lb .gid{font-size:7px;font-weight:700;width:24px;flex-shrink:0}.gc-lb .gcr{color:var(--yl);font-size:7px;flex-shrink:0}.gc-lb .gtx{font-size:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}.gc-bs{flex:1;display:flex;position:relative;height:20px}.gc-cl{flex:1;border-left:1px solid rgba(51,65,85,.12);min-width:18px}.gc-cl.gwe{background:rgba(255,255,255,.01)}.gc-br{position:absolute;height:10px;top:5px;border-radius:2px;min-width:3px;cursor:pointer}.gc-br:hover{opacity:.75}.gc-br span{font-size:6px;color:rgba(0,0,0,.5);font-weight:600;overflow:hidden;padding:0 2px;line-height:10px;white-space:nowrap}.gc-tl{position:absolute;top:0;bottom:0;width:2px;background:var(--rd);z-index:1;pointer-events:none}.gc-lg{display:flex;gap:10px;margin-top:8px;justify-content:center;flex-wrap:wrap}.gc-lg>div{display:flex;align-items:center;gap:3px;font-size:8px;color:var(--t2)}.gc-lg .gsw{width:10px;height:6px;border-radius:1px}.gps{background:var(--cd);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}.gps .gpt{font-size:11px;font-weight:700;color:var(--gd)}.gps .gpi{font-size:10px;color:var(--t2)}.gps .gpi b{color:var(--tx)}.gps .gpa{font-size:10px;color:var(--rd);font-weight:600}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:4px}.map-card{background:var(--cd);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative;overflow:hidden}.map-card:hover{transform:translateY(-2px);border-color:var(--bd)}.map-card.mc-open{border-color:var(--gd);background:#1a2744}.mc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}.mc-icon{font-size:24px;line-height:1}.mc-pct{font-size:22px;font-weight:700;line-height:1}.mc-name{font-size:13px;font-weight:700;margin-bottom:4px}.mc-sub{font-size:10px;color:var(--t3)}.mc-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:10px}.mc-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}.mc-stats{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}.mc-stat{font-size:9px;display:flex;align-items:center;gap:3px}.mc-stat .dot{width:5px;height:5px;border-radius:50%}.mc-expand{margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)}.mc-task{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(51,65,85,.3)}.mc-task:last-child{border-bottom:none}.mc-task .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}.mc-task .tid{font-size:8px;font-weight:700;width:24px;flex-shrink:0;color:var(--t2)}.mc-task .tcr{font-size:8px;color:var(--yl);flex-shrink:0;width:10px}.mc-task .ttx{font-size:10px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.mc-task select{font-size:8px;font-weight:600;border:none;border-radius:3px;padding:2px 4px;cursor:pointer;outline:none;width:68px;flex-shrink:0;font-family:inherit}.mc-task .tdet{font-size:10px;color:var(--t3);cursor:pointer;padding:0 4px}.mc-task .tdet:hover{color:var(--gd)}.mc-add{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:8px;padding:6px;background:var(--sf);border-radius:6px;font-size:10px;color:var(--t3);cursor:pointer;border:1px dashed var(--bd);transition:.2s}.mc-add:hover{border-color:var(--gd);color:var(--gd)}.map-summary{background:var(--cd);border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}.map-summary .ms-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--gd)}.map-summary .ms-item{font-size:11px;color:var(--t2)}.map-summary .ms-item b{color:var(--tx);font-size:13px}


.rpt-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.rpt{background:#fff;color:#1a1a2e;border-radius:12px;width:100%;max-width:800px;max-height:92vh;overflow-y:auto;font-family:'DM Sans',sans-serif}
.rpt-actions{position:sticky;top:0;background:#fff;padding:12px 24px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;z-index:1;border-radius:12px 12px 0 0}
.rpt-actions button{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.rpt-actions .rpt-print{background:#C49A2A;color:#fff;border:none}
.rpt-actions .rpt-close{background:transparent;border:1px solid #d1d5db;color:#6b7280}
.rpt-body{padding:24px 32px}
.rpt h1{font-family:'Playfair Display',serif;font-size:24px;color:#1B365D;margin-bottom:4px}
.rpt .rpt-sub{font-size:12px;color:#6b7280;margin-bottom:20px}
.rpt .rpt-signal{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:16px}
.rpt .rpt-signal.green{background:#dcfce7;color:#166534}
.rpt .rpt-signal.yellow{background:#fef3c7;color:#92400e}
.rpt .rpt-signal.red{background:#fee2e2;color:#991b1b}
.rpt h2{font-size:15px;font-weight:700;color:#1B365D;margin:20px 0 10px;padding-bottom:4px;border-bottom:2px solid #C49A2A}
.rpt h3{font-size:13px;font-weight:600;color:#C49A2A;margin:14px 0 6px}
.rpt .rpt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.rpt .rpt-kpi{background:#f8fafc;border-radius:8px;padding:12px;text-align:center;border:1px solid #e5e7eb}
.rpt .rpt-kpi .kv{font-size:28px;font-weight:700;line-height:1}
.rpt .rpt-kpi .kl{font-size:10px;color:#6b7280;margin-top:2px}
.rpt .rpt-area{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9}
.rpt .rpt-area .ra-name{flex:1;font-size:12px;font-weight:600}
.rpt .rpt-area .ra-bar{width:120px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.rpt .rpt-area .ra-fill{height:100%;border-radius:3px}
.rpt .rpt-area .ra-pct{font-size:12px;font-weight:700;width:40px;text-align:right}
.rpt .rpt-milestone{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:11px}
.rpt .rpt-milestone .ms-icon{font-size:14px;flex-shrink:0}
.rpt .rpt-milestone .ms-txt{flex:1}
.rpt .rpt-milestone .ms-date{color:#6b7280;flex-shrink:0}
.rpt .rpt-risk{padding:8px 10px;margin-bottom:6px;border-radius:6px;font-size:11px;line-height:1.4}
.rpt .rpt-risk.rr{background:#fee2e2;border-left:3px solid #ef4444}
.rpt .rpt-risk.ry{background:#fef3c7;border-left:3px solid #f59e0b}
.rpt .rpt-budget{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.rpt .rpt-budget th{background:#1B365D;color:#fff;padding:6px 10px;text-align:left;font-weight:600}
.rpt .rpt-budget td{padding:5px 10px;border-bottom:1px solid #e5e7eb}
.rpt .rpt-budget tr:nth-child(even) td{background:#f8fafc}
.rpt .rpt-footer{margin-top:24px;padding-top:12px;border-top:1px solid #e5e7eb;font-size:9px;color:#9ca3af;text-align:center}
@media print{.rpt-bg{position:static;background:none;padding:0}.rpt{max-height:none;box-shadow:none;border-radius:0}.rpt-actions{display:none}}


.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;margin-top:10px}
.tm-card{background:var(--cd);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;border:2px solid transparent}
.tm-card:hover{border-color:var(--bd);transform:translateY(-1px)}
.tm-card.tm-open{border-color:var(--gd);background:#1a2744}
.tm-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.tm-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.tm-info{flex:1;min-width:0}
.tm-name{font-size:13px;font-weight:700;color:var(--tx)}
.tm-role{font-size:10px;color:var(--t3)}
.tm-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tm-tag{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--sf);color:var(--t2);border:1px solid var(--bd)}
.tm-tag.dip{border-color:#3b82f6;color:#3b82f6}
.tm-tag.free{border-color:#8b5cf6;color:#8b5cf6}
.tm-tag.cons{border-color:#f59e0b;color:#f59e0b}
.tm-tag.soc{border-color:#22c55e;color:#22c55e}
.tm-stats{display:flex;gap:12px;font-size:10px;color:var(--t2)}
.tm-stats b{color:var(--tx)}
.tm-tasks{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.tm-task{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid rgba(51,65,85,.2);font-size:10px}
.tm-task:last-child{border-bottom:none}
.tm-task .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tm-task .tid{font-weight:700;width:24px;flex-shrink:0;color:var(--t2)}
.tm-task .ttx{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tm-task .tdt{color:var(--t3);flex-shrink:0;width:65px;text-align:right;font-size:9px}
.tm-task select{font-size:8px;font-weight:600;border:none;border-radius:3px;padding:1px 3px;cursor:pointer;outline:none;width:62px;flex-shrink:0;font-family:inherit}
.tm-task .tgo{color:var(--t3);cursor:pointer;font-size:10px;padding:0 3px;flex-shrink:0}
.tm-task .tgo:hover{color:var(--gd)}
.tm-cost{margin-top:8px;padding:8px;background:var(--sf);border-radius:6px;font-size:10px;color:var(--t2)}
.tm-cost b{color:var(--tx)}
.tm-actions{display:flex;gap:4px;margin-top:8px}
.tm-actions button{padding:3px 8px;border-radius:4px;font-size:9px;cursor:pointer;font-family:inherit}

function isOverdue(t){
  var pp=(t.d1||"").split("/");
  if(pp.length!==2)return false;
  var ed=new Date(2026,parseInt(pp[1])-1,parseInt(pp[0]));
  return ed<new Date()&&gSt(t.id)!=="done";
}
function getWeekNum(){
  var now=new Date(),sd=new Date(2026,2,10);
  var diff=Math.floor((now-sd)/(7*864e5))+1;
  return Math.max(1,Math.min(diff,5));
}
function getTimePct(){
  var now=new Date(),sd=new Date(2026,2,10),ed=new Date(2026,3,12);
  if(now<sd)return 0;if(now>ed)return 100;
  return Math.round((now-sd)/(ed-sd)*100);
}

function gSec(id){return SECS.find(s=>s.id===id)}
function gSt(id){return statuses[id]||"todo"}
function gStO(v){return STS.find(s=>s.v===v)}

function filt(){
  return tasks.filter(t=>{
    if(fSec!=="all"&&t.s!==fSec)return false;
    if(fWk>0&&t.w!==fWk)return false;
    if(fSt!=="all"&&gSt(t.id)!==fSt)return false;
    if(fCr&&!t.cr)return false;
    if(fSrch){const q=fSrch.toLowerCase();if(!t.t.toLowerCase().includes(q)&&!t.r.toLowerCase().includes(q)&&!t.id.includes(q)&&!(t.desc||"").toLowerCase().includes(q))return false;}
    return true;
  });
}

function stats(){
  const tot=tasks.length,done=tasks.filter(t=>gSt(t.id)==="done").length,prog=tasks.filter(t=>gSt(t.id)==="progress").length,blk=tasks.filter(t=>gSt(t.id)==="blocked").length;
  const crT=tasks.filter(t=>t.cr).length,crD=tasks.filter(t=>t.cr&&gSt(t.id)==="done").length;
  const bS={},bW={};
  SECS.forEach(s=>{const st=tasks.filter(t=>t.s===s.id);bS[s.id]={t:st.length,d:st.filter(t=>gSt(t.id)==="done").length};});
  WKS.forEach(w=>{const wt=tasks.filter(t=>t.w===w.id);bW[w.id]={t:wt.length,d:wt.filter(t=>gSt(t.id)==="done").length};});
  return{tot,done,prog,blk,todo:tot-done-prog-blk,crT,crD,bS,bW};
}

function h(tag,at,...ch){
  const el=document.createElement(tag);
  if(at)Object.entries(at).forEach(([k,v])=>{
    if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="className")el.className=v;
    else if(k==="checked")el.checked=v;
    else if(k==="value")el.value=v;
    else if(k==="selected")el.selected=v;
    else el.setAttribute(k,v);
  });
  ch.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==="string"?document.createTextNode(c):c);});
  return el;
}

function mkSel(cls,cur,opts,fn){
  const s=h("select",{className:cls,onChange:e=>fn(e.target.value)});
  opts.forEach(([v,l])=>{const o=h("option",{value:v},l);if(cur===v)o.selected=true;s.append(o);});
  return s;
}

function mkSVG(pct){
  const ns="http://www.w3.org/2000/svg",svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox","0 0 36 36");svg.style.cssText="width:80px;height:80px;transform:rotate(-90deg)";
  const c1=document.createElementNS(ns,"circle");[["cx","18"],["cy","18"],["r","15.5"],["fill","none"],["stroke","#1e293b"],["stroke-width","2.5"]].forEach(([a,v])=>c1.setAttribute(a,v));
  const c2=document.createElementNS(ns,"circle");[["cx","18"],["cy","18"],["r","15.5"],["fill","none"],["stroke","#C49A2A"],["stroke-width","2.5"],["stroke-dasharray",pct*.974+" 100"],["stroke-linecap","round"]].forEach(([a,v])=>c2.setAttribute(a,v));
  svg.append(c1,c2);return svg;
}

function saveToFile(){
  var data=JSON.stringify({tasks:tasks,statuses:statuses,notes:notes,checks:checks,team:team,pmComment:pmComment,budgetSpent:budgetSpent,_exported:new Date().toISOString()},null,2);
  var blob=new Blob([data],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="MEC_Backup_"+new Date().toISOString().slice(0,10)+".json";a.click();
}
function loadFromFile(){
  var inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.addEventListener("change",function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var d=JSON.parse(e.target.result);
        if(d.tasks)tasks=d.tasks;
        if(d.statuses)statuses=d.statuses;
        if(d.notes)notes=d.notes;
        if(d.checks)checks=d.checks;
        if(d.team)team=d.team;
        if(d.pmComment!==undefined)pmComment=d.pmComment;
        if(d.budgetSpent)budgetSpent=d.budgetSpent;
        save();render();
        alert("Dati caricati con successo! (Backup del "+((d._exported||"").slice(0,10)||"sconosciuto")+")");
      }catch(err){alert("Errore nel file: "+err.message);}
    };
    reader.readAsText(file);
  });
  inp.click();
}
